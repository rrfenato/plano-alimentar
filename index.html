<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#100F0F">
<title>Plano Alimentar — Ricardo</title>
<style>
  :root{
    --bg:#100F0F;
    --panel:#1C1B1A;
    --panel-2:#161514;
    --line:#403E3C;
    --ink:#CECDC3;
    --ink-dim:#878580;
    --ink-faint:#6F6E69;
    --sage:#B7B5AC;
    --sage-deep:#878580;
    --amber:#DA702C;
    --sel:#282726;
    --sel-line:#575653;
    --radius:14px;
    --pro:#879A39;
    --carb:#D0A215;
    --fat:#DA702C;
    --kcal:#4385BE;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.45;
    padding-bottom:40px;
    background-image:none;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px}

  /* ---- header ---- */
  header{padding:30px 16px 18px;max-width:680px;margin:0 auto}
  h1{
    font-size:27px;font-weight:700;letter-spacing:-.02em;line-height:1.1;
  }

  /* ---- meal nav ---- */
  .mealnav{
    display:flex;gap:6px;padding:14px 16px 4px;
    max-width:680px;margin:0 auto;
  }
  .mealnav button{
    flex:1 1 0;min-width:0;background:var(--panel);border:1px solid var(--line);
    color:var(--ink-dim);font-size:12.5px;font-weight:600;line-height:1.15;
    padding:10px 6px;border-radius:var(--radius);cursor:pointer;
    font-family:inherit;transition:.18s;text-align:center;
  }
  .mealnav button .t{font-size:10.5px;color:var(--ink-faint);font-weight:500;display:block;margin-top:2px}
  .mealnav button.active{background:var(--sel);border-color:var(--sel-line);color:var(--ink)}
  .mealnav button.active .t{color:var(--sage)}

  /* ---- meal card ---- */
  .meal{display:none;animation:fade .25s ease}
  .meal.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px;margin-top:14px;
  }
  .meal-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .meal-time{
    font-size:12px;font-weight:700;color:var(--amber);
    letter-spacing:.05em;font-variant-numeric:tabular-nums;
  }
  .meal-name{font-size:18px;font-weight:700;letter-spacing:-.01em}

  .step-label{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:600;margin:16px 0 9px;
  }
  .step-label:first-of-type{margin-top:14px}

  /* ---- choice pills (proteina / carbo) ---- */
  .choices{display:flex;flex-wrap:wrap;gap:7px}
  .choice{
    background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:10px 13px;cursor:pointer;
    transition:.15s;display:flex;flex-direction:column;gap:1px;min-width:0;
    flex:1 1 calc(50% - 4px);
  }
  .choice:hover{border-color:var(--sel-line)}
  .choice.on{background:var(--sel);border-color:var(--sel-line)}
  .choice .nm{font-size:13.5px;font-weight:600;color:var(--ink)}
  .choice .qt{font-size:12px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .choice.on .qt{color:var(--sage)}

  /* ---- per-meal macro proportion bar ---- */
  .mealmacro{margin:12px 0 2px}
  .mm-kcal{display:flex;align-items:baseline;gap:5px;margin-bottom:9px}
  .mm-kn{font-size:21px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
  .mm-ku{font-size:11px;color:var(--ink-dim);font-weight:500}
  .mm-track{display:flex;height:7px;border-radius:99px;overflow:hidden;background:var(--panel-2)}
  .mm-seg{height:100%;transition:width .35s ease}
  .mm-leg{display:flex;gap:14px;margin-top:7px;flex-wrap:wrap}
  .mm-leg span{font-size:11px;color:var(--ink-dim);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:5px}
  .mm-leg .d{width:8px;height:8px;border-radius:2px;flex:0 0 8px}

  /* ---- macro pie (resumo do dia) ---- */
  .macropie{
    display:flex;align-items:center;gap:22px;margin-top:18px;
    border-top:1px solid var(--line);padding-top:18px;flex-wrap:wrap;
  }
  .pie{
    width:128px;height:128px;border-radius:50%;flex:0 0 128px;
    position:relative;
    animation:pie-in .5s ease;
  }
  .pie::before{
    content:"";position:absolute;top:50%;left:50%;
    width:104px;height:104px;border-radius:50%;
    background:var(--panel);transform:translate(-50%,-50%);
  }
  @keyframes pie-in{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .pie-hole{
    position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
  }
  .pie-k{font-size:25px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
  .pie-u{font-size:11px;color:var(--ink-dim);font-weight:500;margin-top:2px}
  .pie-leg{flex:1;min-width:160px;display:flex;flex-direction:column;gap:9px}
  .leg-row{display:flex;align-items:center;gap:9px}
  .leg-row .dot{width:11px;height:11px;border-radius:3px;flex:0 0 11px}
  .leg-nm{font-size:13.5px;color:var(--ink);font-weight:600;flex:1}
  .leg-v{font-size:13px;color:var(--ink-dim);font-variant-numeric:tabular-nums}

  /* ---- combo auto items ---- */
  .combo{
    margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;
  }
  .auto-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:7px 0;gap:12px;
  }
  .auto-row + .auto-row{border-top:1px solid var(--panel-2)}
  .auto-row .nm{font-size:14px;color:var(--ink)}
  .auto-row .qt{font-size:13px;color:var(--ink-dim);font-variant-numeric:tabular-nums;white-space:nowrap}
  .free-note{font-size:11.5px;color:var(--sage);margin-left:6px;font-weight:500}

  /* fixed extras (azeite, creatina) */
  .extra-row .nm{color:var(--ink-dim)}

  .disclaimer{
    font-size:11px;color:var(--ink-faint);text-align:center;
    padding:18px 16px 6px;max-width:680px;margin:0 auto;line-height:1.5;
  }
  .disclaimer b{color:var(--ink-dim)}

  /* day total toggle */
  .daybtn{
    display:block;width:100%;margin-top:16px;background:var(--panel-2);
    border:1px solid var(--line);color:var(--ink-dim);
    padding:11px;border-radius:10px;font-family:inherit;font-size:13px;
    font-weight:600;cursor:pointer;transition:.15s;
  }
  .daybtn:hover{border-color:var(--sel-line);color:var(--ink)}
</style>
</head>
<body>

<header>
  <h1>Plano Alimentar</h1>
</header>

<nav class="mealnav" id="mealnav"></nav>

<div class="wrap" id="meals"></div>

<div class="wrap" style="margin-top:16px;margin-bottom:24px">
  <button class="daybtn" id="daybtn" style="display:block;width:100%">
    Total do dia
  </button>
</div>

<script>
// ===== MACRO DB (por 100g salvo nota) — TACO 4ed / USDA FDC / rotulos BR =====
// [kcal, P, C, G] por 100g
const M = {
  ovo:[143,13.0,1.6,9.5], cottage:[98,11.0,3.4,4.3], ricota:[138,11.0,4.0,8.0],
  whey_iso:[370,90,1,1], whey_dym:[412,73.5,23.5,7.4],
  frango_desf:[163,31,0,3.6], atum:[198,26,0,10],
  pao:[253,8.5,48,3.5], torrada:[410,11,70,9], abacate:[96,1.2,6,8.4],
  pistache:[567,20,28,45], mel:[309,0.3,84,0], fruta:[43,0.9,10,0.4],
  salada_frutas:[50,0.6,12,0.2], creatina:[0,0,0,0],
  filé:[163,31,0,3.6], tilapia:[128,26,0,2.7], carne:[219,32,0,9],
  salmao:[208,22,0,13], sobrecoxa:[177,24,0,8.5], coxa:[185,24,0,9.5],
  porco:[242,27,0,14], xadrez:[120,12,6,5],
  arroz:[128,2.5,28,0.2], feijao:[76,4.8,13.6,0.5],
  bat_ing_coz:[52,1.2,11.9,0], bat_ing_ass:[88,1.8,20,0.1],
  bat_doce_coz:[77,0.6,18.4,0.1], bat_doce_ass:[118,2.0,28.2,0.1],
  pure_doce:[90,1.5,21,0.5], pure_ing:[83,2,13,2.5], macarrao:[157,5.8,30.9,1.3],
  aipim:[125,0.6,30.1,0.3], baroa:[101,1,24,0.2], cuscuz:[112,3.8,23.2,0.2],
  azeite:[884,0,0,100],
  // produtos prontos: valor por UNIDADE ja embutido (flag unit:true), guardamos por 100g virtual
};
// produtos com macro por porcao fixa (nao escalam por g do usuario)
const FIXED = {
  yopro17:[150,17,14,3],     // 160g unidade
  yopro15:[120,15,12,2.5],   // 160g unidade
  winstage:[210,20,22,7],    // 1 barra
  zaytas:[140,10,12,6],      // 1 pacote 30g
};


function mc(key,g){ const d=M[key]; const f=g/100; return [d[0]*f,d[1]*f,d[2]*f,d[3]*f]; }
function fx(key){ return FIXED[key].slice(); }

// ===== carbo option sets (reused) =====
const CARB_ALMOCO = [
  ['arroz','Arroz branco',135],['bat_ing_coz','Batata inglesa cozida',240],
  ['bat_ing_ass','Batata inglesa assada',180],['bat_doce_coz','Batata doce cozida',160],
  ['bat_doce_ass','Batata doce assada',110],['pure_doce','Purê batata doce',145],
  ['pure_ing','Purê batata inglesa',240],['macarrao','Macarrão',150],
  ['aipim','Aipim',130],['baroa','Batata baroa',180],['cuscuz','Cuscuz marroquino',170],
];
const CARB_JANTAR = [
  ['bat_doce_ass','Batata doce assada',110],['arroz','Arroz branco',135],
  ['bat_ing_coz','Batata inglesa cozida',240],['bat_ing_ass','Batata inglesa assada',180],
  ['bat_doce_coz','Batata doce cozida',160],['pure_doce','Purê batata doce',145],
  ['pure_ing','Purê batata inglesa',240],['macarrao','Macarrão',150],
  ['aipim','Aipim',130],['baroa','Batata baroa',180],['cuscuz','Cuscuz marroquino',170],
];

// ===== MEAL DEFINITIONS =====
// proteins: [key, label, grams]  (key 'fx:' prefix = fixed product)
// combo: array of auto items {k,label,g} OR carbSet for flexible carb
const MEALS = [
  {
    id:'cafe', time:'06:30', name:'Café da manhã', stepLabel:'Escolha a base',
    proteins:[
      {id:'ovo', nm:'Ovos', qt:'3 un · 150g', key:'ovo', g:150,
        combo:[{k:'cottage',label:'Queijo cottage',g:25, alt:[['cottage','Cottage',25],['ricota','Creme ricota light',20]]}],
        carb:{label:'Pão / torrada', opts:[['pao','Pão de forma',25],['torrada','Torrada Magic Toast',18]]},
        fixed:[{k:'fruta',label:'Fruta vermelha',g:50},{k:'creatina',label:'Creatina',g:5}] },
      {id:'ovoabac', nm:'Ovos + abacate', qt:'3 un · 150g', key:'ovo', g:150,
        carb:{label:'Pão / torrada', opts:[['pao','Pão de forma',25],['torrada','Torrada Magic Toast',18]]},
        fixed:[{k:'abacate',label:'Abacate',g:30},{k:'creatina',label:'Creatina',g:5}] },
      {id:'yopro', nm:'YoPRO 17g', qt:'160g', fx:'yopro17',
        fixed:[{k:'fruta',label:'Fruta vermelha',g:50},{k:'pistache',label:'Pistache',g:20},{k:'mel',label:'Mel',g:15},{k:'creatina',label:'Creatina',g:5}] },
    ],
  },
  {
    id:'almoco', time:'12:00', name:'Almoço', stepLabel:'Escolha a proteína',
    proteins:[
      {id:'frango', nm:'Frango grelhado', qt:'180g', key:'filé', g:180},
      {id:'tilapia', nm:'Tilápia', qt:'240g', key:'tilapia', g:240},
      {id:'carne', nm:'Carne vermelha', qt:'160g', key:'carne', g:160},
      {id:'salmao', nm:'Salmão', qt:'180g', key:'salmao', g:180},
      {id:'sobre', nm:'Sobrecoxa s/ pele', qt:'180g', key:'sobrecoxa', g:180},
      {id:'coxa', nm:'Coxa de frango', qt:'190g', key:'coxa', g:190},
      {id:'xadrez', nm:'Frango xadrez', qt:'265g', key:'xadrez', g:265},
      {id:'porco', nm:'Carne de porco', qt:'145g', key:'porco', g:145},
    ],
    carb:{label:'Escolha o carbo', opts:CARB_ALMOCO},
    fixed:[{k:'feijao',label:'Feijão carioca',g:80},{k:'azeite',label:'Azeite (5ml)',g:5}],
    saladaNote:true,
  },
  {
    id:'tarde', time:'16:00', name:'Lanche da tarde', stepLabel:'Escolha a opção',
    proteins:[
      {id:'yopro15', nm:'YoPRO 15g', qt:'160g', fx:'yopro15',
        fixed:[{k:'fruta',label:'Morango',g:72},{k:'pistache',label:'Pistache',g:20}] },
      {id:'winstage', nm:'Barrinha Winstage', qt:'54g', fx:'winstage' },
      {id:'zaytas', nm:'Snack Zaytas', qt:'30g', fx:'zaytas' },
      {id:'whey', nm:'Whey + salada frutas', qt:'34g', key:'whey_dym', g:34,
        fixed:[{k:'salada_frutas',label:'Salada de frutas',g:150}] },
      {id:'paoatum', nm:'Pão + atum + ricota', qt:'lanche', key:'atum', g:60,
        carb:{label:'Pão', opts:[['pao','Pão de forma',50]]},
        fixed:[{k:'ricota',label:'Creme ricota light',g:20}] },
    ],
  },
  {
    id:'jantar', time:'20:00', name:'Jantar', stepLabel:'Escolha a proteína',
    proteins:[
      {id:'frango', nm:'Frango grelhado', qt:'180g', key:'filé', g:180},
      {id:'tilapia', nm:'Tilápia', qt:'235g', key:'tilapia', g:235},
      {id:'carne', nm:'Carne vermelha', qt:'155g', key:'carne', g:155},
      {id:'salmao', nm:'Salmão', qt:'180g', key:'salmao', g:180},
      {id:'sobre', nm:'Sobrecoxa s/ pele', qt:'180g', key:'sobrecoxa', g:180},
      {id:'coxa', nm:'Coxa de frango', qt:'190g', key:'coxa', g:190},
      {id:'xadrez', nm:'Frango xadrez', qt:'265g', key:'xadrez', g:265},
      {id:'porco', nm:'Carne de porco', qt:'145g', key:'porco', g:145},
    ],
    carb:{label:'Escolha o carbo', opts:CARB_JANTAR},
    fixed:[{k:'azeite',label:'Azeite (5ml)',g:5}],
    saladaNote:true,
  },
];

// reference daily targets for bar scaling (approx from base plan)
const REF = {P:160, C:140, G:55};

// ===== STATE =====
const sel = {}; // meal.id -> {protIdx, carbIdx, altIdx{comboItemIdx:idx}}
MEALS.forEach(m=>{ sel[m.id]={prot:0, carb:0, alt:{}}; });
let activeMeal = MEALS[0].id;
let dayMode = false;

// ===== RENDER NAV =====
const nav = document.getElementById('mealnav');
MEALS.forEach(m=>{
  const b=document.createElement('button');
  b.dataset.id=m.id;
  const navLabel = {cafe:'Café', almoco:'Almoço', tarde:'Lanche', jantar:'Jantar'}[m.id] || m.name;
  b.innerHTML = `${navLabel}<span class="t">${m.time}</span>`;
  b.onclick=()=>{ dayMode=false; activeMeal=m.id; render(); };
  nav.appendChild(b);
});

// ===== RENDER MEALS =====
const mealsEl = document.getElementById('meals');

function calcMeal(m){
  const s = sel[m.id];
  const p = m.proteins[s.prot];
  let tot=[0,0,0,0];
  const add=a=>{for(let i=0;i<4;i++)tot[i]+=a[i];};
  // protein
  if(p.fx) add(fx(p.fx)); else if(p.key) add(mc(p.key,p.g));
  // combo alt items (e.g. cottage/ricota)
  if(p.combo) p.combo.forEach((ci,idx)=>{
    if(ci.alt){ const ai=s.alt[idx]||0; const a=ci.alt[ai]; add(mc(a[0],a[2])); }
    else add(mc(ci.k,ci.g));
  });
  // protein-level fixed extras
  if(p.fixed) p.fixed.forEach(f=>add(mc(f.k,f.g)));
  // protein-level carb (cafe/tarde)
  if(p.carb){ const ci=s.carb||0; const o=p.carb.opts[ci]; add(mc(o[0],o[2])); }
  // meal-level carb (almoco/jantar)
  if(m.carb){ const ci=s.carb||0; const o=m.carb.opts[ci]; add(mc(o[0],o[2])); }
  // meal-level fixed
  if(m.fixed) m.fixed.forEach(f=>add(mc(f.k,f.g)));
  return tot;
}

function macroBar(tot){
  const [k,P,C,G]=tot;
  const kP=P*4,kC=C*4,kG=G*9, s=kP+kC+kG||1;
  const wP=kP/s*100, wC=kC/s*100, wG=kG/s*100;
  return `<div class="mealmacro">
    <div class="mm-kcal"><span class="mm-kn">${Math.round(k)}</span><span class="mm-ku">kcal</span></div>
    <div class="mm-track">
    <div class="mm-seg" style="width:${wP}%;background:var(--pro)"></div>
    <div class="mm-seg" style="width:${wC}%;background:var(--carb)"></div>
    <div class="mm-seg" style="width:${wG}%;background:var(--fat)"></div>
    </div><div class="mm-leg">
    <span><span class="d" style="background:var(--pro)"></span>P ${Math.round(P)}g</span>
    <span><span class="d" style="background:var(--carb)"></span>C ${Math.round(C)}g</span>
    <span><span class="d" style="background:var(--fat)"></span>G ${Math.round(G)}g</span>
    </div></div>`;
}

function render(){
  // nav active
  [...nav.children].forEach(b=>b.classList.toggle('active', b.dataset.id===activeMeal && !dayMode));
  mealsEl.innerHTML='';

  if(dayMode){
    // soma do dia
    let day=[0,0,0,0];
    MEALS.forEach(m=>{ const t=calcMeal(m); for(let i=0;i<4;i++)day[i]+=t[i]; });
    const [dk,dP,dC,dG]=day;
    // share por CALORIA de cada macro
    const kP=dP*4, kC=dC*4, kG=dG*9;
    const ksum=kP+kC+kG || 1;
    const pP=kP/ksum*100, pC=kC/ksum*100, pG=kG/ksum*100;
    const aP=pP*3.6, aC=pC*3.6; // graus acumulados
    const pie=`conic-gradient(var(--pro) 0 ${aP}deg, var(--carb) ${aP}deg ${aP+aC}deg, var(--fat) ${aP+aC}deg 360deg)`;

    let dh = `<div class="card" style="display:block"><div class="meal-head"><span class="meal-name">Resumo do dia</span></div>
      <div style="font-size:12px;color:var(--ink-faint);margin-top:10px;margin-bottom:4px">Uma porção de cada refeição — toque numa refeição acima para trocar a escolha</div>`;
    MEALS.forEach(m=>{
      const t=calcMeal(m); const pr=m.proteins[sel[m.id].prot]; const pnm=pr.nm;
      dh += `<div class="auto-row"><span class="nm"><span style="color:var(--amber);font-variant-numeric:tabular-nums;font-size:12px;font-weight:700">${m.time}</span>&nbsp;&nbsp;${pnm}</span><span class="qt">${Math.round(t[0])} kcal</span></div>`;
    });
    // chart block
    dh += `<div class="macropie">
      <div class="pie" style="background:${pie}"><div class="pie-hole"><span class="pie-k">${Math.round(dk)}</span><span class="pie-u">kcal</span></div></div>
      <div class="pie-leg">
        <div class="leg-row"><span class="dot" style="background:var(--pro)"></span><span class="leg-nm">Proteína</span><span class="leg-v">${Math.round(dP)}g · ${Math.round(pP)}%</span></div>
        <div class="leg-row"><span class="dot" style="background:var(--carb)"></span><span class="leg-nm">Carbo</span><span class="leg-v">${Math.round(dC)}g · ${Math.round(pC)}%</span></div>
        <div class="leg-row"><span class="dot" style="background:var(--fat)"></span><span class="leg-nm">Gordura</span><span class="leg-v">${Math.round(dG)}g · ${Math.round(pG)}%</span></div>
      </div>
    </div>`;
    dh += `</div>`;
    const wrap=document.createElement('div'); wrap.className='meal show'; wrap.innerHTML=dh;
    mealsEl.appendChild(wrap);
    updateBar();
    return;
  }

  MEALS.forEach(m=>{
    const card=document.createElement('div');
    card.className='meal'+((m.id===activeMeal && !dayMode)?' show':'');
    const s=sel[m.id];
    const p=m.proteins[s.prot];

    let html = `<div class="card">
      <div class="meal-head"><span class="meal-time">${m.time}</span><span class="meal-name">${m.name}</span></div>
      ${macroBar(calcMeal(m))}
      <div class="step-label">${m.stepLabel}</div>
      <div class="choices">`;
    m.proteins.forEach((pr,i)=>{
      html += `<div class="choice ${i===s.prot?'on':''}" data-m="${m.id}" data-p="${i}">
        <span class="nm">${pr.nm}</span><span class="qt">${pr.qt}</span></div>`;
    });
    html += `</div>`;

    // protein-level carb selector (cafe ovo / tarde pao-atum)
    if(p.carb && p.carb.opts.length>1){
      html += `<div class="step-label">${p.carb.label}</div><div class="choices">`;
      p.carb.opts.forEach((o,i)=>{
        html += `<div class="choice ${i===(s.carb||0)?'on':''}" data-m="${m.id}" data-c="${i}">
          <span class="nm">${o[1]}</span><span class="qt">${o[2]}g</span></div>`;
      });
      html += `</div>`;
    }

    // combo alt items (cottage/ricota choice)
    if(p.combo){
      p.combo.forEach((ci,idx)=>{
        if(ci.alt && ci.alt.length>1){
          html += `<div class="step-label">${ci.label}</div><div class="choices">`;
          ci.alt.forEach((a,ai)=>{
            html += `<div class="choice ${ai===(s.alt[idx]||0)?'on':''}" data-m="${m.id}" data-ci="${idx}" data-ai="${ai}">
              <span class="nm">${a[1]}</span><span class="qt">${a[2]}g</span></div>`;
          });
          html += `</div>`;
        }
      });
    }

    // meal-level carb (almoco/jantar)
    if(m.carb){
      html += `<div class="step-label">${m.carb.label}</div><div class="choices">`;
      m.carb.opts.forEach((o,i)=>{
        html += `<div class="choice ${i===(s.carb||0)?'on':''}" data-m="${m.id}" data-c="${i}">
          <span class="nm">${o[1]}</span><span class="qt">${o[2]}g</span></div>`;
      });
      html += `</div>`;
    }

    // auto items (come together)
    const autos=[];
    if(p.fixed) p.fixed.forEach(f=>autos.push([f.label, gLabel(f.k,f.g), f.k]));
    if(m.fixed) m.fixed.forEach(f=>autos.push([f.label, gLabel(f.k,f.g), f.k]));
    if(autos.length){
      html += `<div class="combo">`;
      autos.forEach(a=>{
        html += `<div class="auto-row extra-row"><span class="nm">${a[0]}</span><span class="qt">${a[1]}</span></div>`;
      });
      html += `</div>`;
    }
    if(m.saladaNote){
      html += `<div class="auto-row" style="border-top:1px dashed var(--line);margin-top:4px">
        <span class="nm" style="color:var(--sage)">Salada variada + legumes</span>
        <span class="qt" style="color:var(--sage)">à vontade</span></div>`;
    }

    html += `</div>`;
    card.innerHTML=html;
    mealsEl.appendChild(card);
  });

  // bind choices
  mealsEl.querySelectorAll('.choice').forEach(el=>{
    el.onclick=()=>{
      const mid=el.dataset.m;
      if(el.dataset.p!==undefined){ sel[mid].prot=+el.dataset.p; sel[mid].carb=0; sel[mid].alt={}; }
      else if(el.dataset.c!==undefined){ sel[mid].carb=+el.dataset.c; }
      else if(el.dataset.ci!==undefined){ sel[mid].alt[+el.dataset.ci]=+el.dataset.ai; }
      render();
    };
  });

  updateBar();
}

function gLabel(k,g){
  // human-ish unit hints
  if(k==='creatina')return '5g';
  if(k==='azeite')return '5ml';
  if(k==='feijao')return '80g';
  return g+'g';
}

// ===== day toggle button label =====
function updateBar(){
  document.getElementById('daybtn').textContent = dayMode
    ? 'Refeição única'
    : 'Total do dia';
}

document.getElementById('daybtn').onclick=()=>{ dayMode=!dayMode; render(); };

render();
</script>
</body>
</html>
